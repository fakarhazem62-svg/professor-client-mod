name: Build Professor Client Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Download Gradle 8.8
        run: |
          curl -fL https://services.gradle.org/distributions/gradle-8.8-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /home/runner
          echo "/home/runner/gradle-8.8/bin" >> $GITHUB_PATH

      - name: Build Mod
        run: gradle build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: professor-client-mod
          path: build/libs/professor-client-*.jar
          if-no-files-found: error
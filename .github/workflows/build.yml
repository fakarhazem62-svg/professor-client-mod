name: Build Professor Client Mod

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up Java 21
          uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'

        - name: Set up Gradle 8.8
          uses: gradle/actions/setup-gradle@v3
          with:
            gradle-version: '8.8'

        - name: Cache Gradle/Loom
          uses: actions/cache@v4
          with:
            path: |
              ~/.gradle/caches
              ~/.gradle/loom-cache
            key: gradle-loom-${{ hashFiles('gradle.properties') }}
            restore-keys: gradle-loom-

        - name: Build Mod
          run: gradle build --no-daemon

        - name: Upload JAR
          uses: actions/upload-artifact@v4
          with:
            name: professor-client-mod
            path: build/libs/professor-client-*.jar
            if-no-files-found: error
  
name: Build Professor Client Mod

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Java 21
          uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'

        - name: Grant execute permission for gradlew
          run: chmod +x gradlew

        - name: Download Gradle 8.8
          run: |
            curl -fL https://services.gradle.org/distributions/gradle-8.8-bin.zip -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle_dist
            echo "/tmp/gradle_dist/gradle-8.8/bin" >> $GITHUB_PATH

        - name: Build with Gradle
          run: gradle build

        - name: Upload JAR
          uses: actions/upload-artifact@v4
          with:
            name: professor-client-mod-jar
            path: build/libs/professor-client-*.jar
            if-no-files-found: error
  